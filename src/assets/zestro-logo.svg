<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Green rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="36" ry="36" fill="#5DAF3E"/>
  
  <!-- "zestro" bold white text -->
  <text
    x="100"
    y="108"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="54"
    fill="#FFFFFF"
    letter-spacing="-1"
  >zestro</text>
  
  <!-- Tagline text in dark green -->
  <text
    x="100"
    y="138"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="16"
    fill="#1E5C0A"
    letter-spacing="0.3"
  >Your Daily Grocery Buddy</text>
</svg>
